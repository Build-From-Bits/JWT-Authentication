stages:
  - validate
  - test
  - secret-detection
  - release
  - publish

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

sast:
  stage: test

secret_detection:
  stage: secret-detection

validate:package:
  stage: validate
  image: node:20-alpine
  script:
    - |
      if [ -f package-lock.json ]; then
        npm ci
      else
        echo "package-lock.json not found; using npm install"
        npm install --no-audit --no-fund
      fi
    - npm run pack:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

release:on-main:
  stage: release
  image: node:20-alpine
  script:
    - |
      if [ -z "$GITLAB_TOKEN" ]; then
        echo "GITLAB_TOKEN is required (api + write_repository scope)"
        exit 1
      fi
    - export VERSION=$(node -p "require('./package.json').version")
    - export TAG_NAME="v${VERSION}"
    - echo "Preparing release for ${TAG_NAME}"
    - |
      TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/${TAG_NAME}")

      if [ "$TAG_STATUS" = "200" ]; then
        echo "Tag ${TAG_NAME} already exists. Skipping tag/release creation."
        exit 0
      fi
    - |
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --data "tag_name=${TAG_NAME}" \
        --data "ref=${CI_COMMIT_SHA}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags"
    - |
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --data "name=${TAG_NAME}" \
        --data "tag_name=${TAG_NAME}" \
        --data-urlencode "description=Automated release for ${TAG_NAME}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

publish:gitlab-package:
  stage: publish
  image: node:20-alpine
  script:
    - |
      if [ -z "$CI_JOB_TOKEN" ]; then
        echo "CI_JOB_TOKEN is required"
        exit 1
      fi
    - |
      if [ -z "$NPM_REGISTRY_URL" ]; then
        export NPM_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
      fi
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" > .npmrc
    - |
      if [ -f package-lock.json ]; then
        npm ci
      else
        echo "package-lock.json not found; using npm install"
        npm install --no-audit --no-fund
      fi
    - npm run publish:gitlab
  rules:
    - if: '$CI_COMMIT_TAG'
