name: Release And Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  pre_release_checks:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package artifacts
        run: npm run pack:check

  create_release_tag:
    name: Create tag and release
    runs-on: ubuntu-latest
    needs: [pre_release_checks]
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
      version_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check existing tag
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q "${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide publish gate
        id: gate
        run: |
          if [ "${{ steps.check_tag.outputs.exists }}" = "true" ]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

  publish_github_packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [create_release_tag]
    if: needs.create_release_tag.outputs.should_publish == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm run publish:github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
